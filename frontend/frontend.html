<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/frontend.css">
    <script src="./js/frontend.js"></script>
    <title>프런트엔드 개발 지원</title>
  </head>
  <body>
     <div class="container">
    <fieldset>
    <h1>프론트엔드 개발자 지원서</h1>
    <p>HTML,CSS,Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다</p>
    <form action="">
      
      <h4>개인정보</h4>
      <ul>
      <li><p>이름 <input type="text" placeholder="공백없이 입력하세요" /></p></li>
      <li><p>연락처 <input type="text" /></p></li>
      </ul>
       

      <h4>지원 분야</h4>
      <li><input type="radio" />웹 퍼블리싱</li>
      <li><p><input type="radio" />웹 애플리케이션 개발</p></li>
      <li><p><input type="radio" />개발 환경 개선</p/><li>

      <h4>지원동기</h4>
      <li><label for="memo"></label>
      <textarea
        name="memo"
        id="memo"
        cols="40"
        rows="4"
        placeholder="본사 지원 동기를 간략히 써주세요"
      >
      </textarea>
      </li>
      </ul>
      <div class="buttons">
        <input type="submit" value ="접수하기" >
        <input type="reset" value = "다시 쓰기">
      </div>
    </form>
    </fieldset>
    </div>
  </body>
</html>
